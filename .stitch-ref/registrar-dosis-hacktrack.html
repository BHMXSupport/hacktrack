<!-- Bottom Sheet Container -->

<div class="w-12 h-1.5 bg-outline-variant rounded-full mb-stack-md"></div>
<div class="w-full flex justify-between items-center">
<div class="w-10"></div> <!-- Spacer for centering -->
<h2 class="font-headline-sm text-headline-sm text-on-surface">Registrar</h2>
<button aria-label="Cerrar" class="w-10 h-10 flex items-center justify-center text-on-surface-variant hover:bg-surface-variant rounded-full transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</div>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto px-card-padding pb-[100px] flex flex-col gap-stack-lg">
<!-- Section 1: Pre-selected Product -->
<div class="flex flex-col gap-stack-sm">
<span class="font-body-md text-body-md text-on-surface-variant">Producto</span>
<div class="flex items-center justify-between p-stack-md rounded-[12px] border border-surface-container-high bg-surface-bright">
<div class="flex items-center gap-stack-md">
<div class="w-10 h-10 rounded-full bg-primary-container/10 flex items-center justify-center text-primary-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
<span class="font-title-lg text-title-lg text-on-surface">Extracto de Melena de León</span>
</div>
<button class="text-primary-container hover:text-surface-tint font-body-md text-body-md font-medium transition-colors">
                            Cambiar
                        </button>
</div>
</div>

<div class="flex bg-surface-container-low p-1 rounded-[12px]">
<button class="flex-1 py-2 px-3 rounded-[8px] bg-surface-container-lowest shadow-sm font-body-md text-body-md font-medium text-on-surface text-center">Por día</button>
<button class="flex-1 py-2 px-3 rounded-[8px] font-body-md text-body-md text-on-surface-variant hover:bg-surface-variant/50 transition-colors text-center">Semana</button>
<button class="flex-1 py-2 px-3 rounded-[8px] font-body-md text-body-md text-on-surface-variant hover:bg-surface-variant/50 transition-colors text-center">Mes</button>
<button class="flex-1 py-2 px-3 rounded-[8px] font-body-md text-body-md text-on-surface-variant hover:bg-surface-variant/50 transition-colors text-center">Por uso</button>
</div>

<div class="flex justify-between gap-2 mt-stack-sm">
<button class="w-10 h-10 rounded-full bg-primary-container text-on-primary font-body-md text-body-md flex items-center justify-center">L</button>

<button class="w-10 h-10 rounded-full bg-surface-container-high text-on-surface-variant font-body-md text-body-md flex items-center justify-center">S</button>
<button class="w-10 h-10 rounded-full bg-surface-container-high text-on-surface-variant font-body-md text-body-md flex items-center justify-center">D</button>
</div>
</div>

</button>

<span class="px-3 py-1 rounded-full bg-surface-container-low font-label-mono text-label-mono text-on-surface-variant">mg</span>
</div>
<button aria-label="Aumentar dosis" class="w-14 h-14 rounded-full border border-surface-container-high text-on-surface-variant flex items-center justify-center hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">add</span>
</button>
</div>
</div>

<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">schedule</span>
</div>
</div>
</div>
