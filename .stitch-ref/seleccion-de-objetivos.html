<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen pb-24 selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Top App Bar -->
<header class="w-full top-0 sticky bg-surface dark:bg-surface-dim z-40 flat no shadows">
<div class="flex justify-between items-center px-margin-mobile py-4 max-w-[800px] mx-auto">
<button aria-label="Atrás" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-display-md text-display-md text-primary dark:text-primary-fixed font-bold tracking-tight">Hacktrack</h1>
<div class="w-10 h-10"></div> <!-- Placeholder for balance -->
</div>
</header>
<!-- Main Content -->
<main class="px-margin-mobile max-w-[800px] mx-auto pt-6">
<div class="mb-stack-lg text-center">
<h2 class="font-headline-sm text-headline-sm text-primary mb-stack-sm">¿Qué quieres lograr?</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-sm mx-auto">
                Elige tu enfoque principal para personalizar tu experiencia Hacktrack.
            </p>
</div>
<!-- Goal Cards Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Bajar de peso (Metabolismo) -->
<button class="bg-surface-container-lowest border border-surface-variant rounded-20 p-card-padding flex items-center text-left hover:border-cat-metabolismo/50 hover:shadow-[0_4px_16px_rgba(11,18,32,0.08)] transition-all group w-full relative overflow-hidden">
<div class="w-12 h-12 rounded-full bg-cat-metabolismo/10 flex items-center justify-center mr-stack-md flex-shrink-0 group-hover:bg-cat-metabolismo/20 transition-colors">
<span class="material-symbols-outlined text-cat-metabolismo" data-icon="local_fire_department" style="font-variation-settings: 'wght' 300;">local_fire_department</span>
</div>
<div>
<h3 class="font-title-lg text-title-lg text-primary mb-1">Bajar de peso</h3>
<p class="font-body-md text-body-md text-outline">Optimiza tu metabolismo y quema de grasa.</p>
</div>
</button>
<!-- Recuperarme mejor (Recuperación) -->
<button class="bg-surface-container-lowest border border-surface-variant rounded-20 p-card-padding flex items-center text-left hover:border-cat-recuperacion/50 hover:shadow-[0_4px_16px_rgba(11,18,32,0.08)] transition-all group w-full relative overflow-hidden">
<div class="w-12 h-12 rounded-full bg-cat-recuperacion/10 flex items-center justify-center mr-stack-md flex-shrink-0 group-hover:bg-cat-recuperacion/20 transition-colors">
<span class="material-symbols-outlined text-cat-recuperacion" data-icon="bedtime" style="font-variation-settings: 'wght' 300;">bedtime</span>
</div>
<div>
<h3 class="font-title-lg text-title-lg text-primary mb-1">Recuperarme mejor</h3>
<p class="font-body-md text-body-md text-outline">Mejora tu sueño y reduce el estrés físico.</p>
</div>
</button>
<!-- Más energía y foco (Cognitivo) -->
<button class="bg-surface-container-lowest border border-surface-variant rounded-20 p-card-padding flex items-center text-left hover:border-cat-cognitivo/50 hover:shadow-[0_4px_16px_rgba(11,18,32,0.08)] transition-all group w-full relative overflow-hidden">
<div class="w-12 h-12 rounded-full bg-cat-cognitivo/10 flex items-center justify-center mr-stack-md flex-shrink-0 group-hover:bg-cat-cognitivo/20 transition-colors">
<span class="material-symbols-outlined text-cat-cognitivo" data-icon="bolt" style="font-variation-settings: 'wght' 300;">bolt</span>
</div>
<div>
<h3 class="font-title-lg text-title-lg text-primary mb-1">Más energía y foco</h3>
<p class="font-body-md text-body-md text-outline">Claridad mental y rendimiento cognitivo sostenido.</p>
</div>
</button>
<!-- Cuidar mi piel (Piel) -->
<button class="bg-surface-container-lowest border border-surface-variant rounded-20 p-card-padding flex items-center text-left hover:border-cat-piel/50 hover:shadow-[0_4px_16px_rgba(11,18,32,0.08)] transition-all group w-full relative overflow-hidden">
<div class="w-12 h-12 rounded-full bg-cat-piel/10 flex items-center justify-center mr-stack-md flex-shrink-0 group-hover:bg-cat-piel/20 transition-colors">
<span class="material-symbols-outlined text-cat-piel" data-icon="face" style="font-variation-settings: 'wght' 300;">face</span>
</div>
<div>
<h3 class="font-title-lg text-title-lg text-primary mb-1">Cuidar mi piel</h3>
<p class="font-body-md text-body-md text-outline">Salud dermatológica desde adentro hacia afuera.</p>
</div>
</button>
<!-- Longevidad (Anti-Aging) -->
<button class="bg-surface-container-lowest border border-surface-variant rounded-20 p-card-padding flex items-center text-left hover:border-cat-longevidad/50 hover:shadow-[0_4px_16px_rgba(11,18,32,0.08)] transition-all group w-full md:col-span-2 relative overflow-hidden">
<div class="w-12 h-12 rounded-full bg-cat-longevidad/10 flex items-center justify-center mr-stack-md flex-shrink-0 group-hover:bg-cat-longevidad/20 transition-colors">
<span class="material-symbols-outlined text-cat-longevidad" data-icon="spa" style="font-variation-settings: 'wght' 300;">spa</span>
</div>
<div>
<h3 class="font-title-lg text-title-lg text-primary mb-1">Longevidad</h3>
<p class="font-body-md text-body-md text-outline">Prácticas para una vida más larga y saludable.</p>
</div>
</button>
</div>
<div class="mt-stack-lg text-center">
<button class="h-[52px] bg-primary-container text-on-primary px-8 rounded-2xl font-title-lg text-title-lg hover:opacity-90 transition-opacity w-full md:w-auto shadow-sm">
                Continuar
             </button>
<p class="mt-4 font-body-md text-body-md text-outline">Podrás ajustar esto más adelante en tu perfil.</p>
</div>
</main>
<script>
        // Simple script to handle card selection state visually
        document.querySelectorAll('button').forEach(button => {
            if(button.querySelector('h3')) { // Only target the goal cards
                button.addEventListener('click', function() {
                    // Remove active state from all
                    document.querySelectorAll('button h3').forEach(h3 => {
                        h3.parentElement.parentElement.classList.remove('ring-2', 'ring-primary-fixed', 'bg-surface-bright');
                    });
                    // Add active state to clicked
                    this.classList.add('ring-2', 'ring-primary-fixed', 'bg-surface-bright');
                });
            }
        });
    </script>
