<script>
        // Subtle scroll behavior for header elevation
        window.addEventListener('scroll', () => {
            const header = document.getElementById('header');
            if (window.scrollY > 10) {
                header.classList.add('shadow-[0_4px_12px_rgba(11,18,32,0.04)]', 'bg-white');
                header.classList.remove('bg-background');
            } else {
                header.classList.remove('shadow-[0_4px_12px_rgba(11,18,32,0.04)]', 'bg-white');
                header.classList.add('bg-background');
            }
        });

        // Tap interactions for all buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', function() {
                this.style.transform = 'scale(0.98)';
            });
            btn.addEventListener('touchend', function() {
                this.style.transform = 'scale(1)';
            });
        });
    </script>
