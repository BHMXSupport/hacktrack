<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nuevo Registro - Hacktrack</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#f7f9fc",
                        "surface-container-highest": "#e0e3e6",
                        "outline-variant": "#bfc9c6",
                        "tertiary-fixed-dim": "#9dd584",
                        "surface-container": "#eceef1",
                        "tertiary": "#114302",
                        "surface": "#f7f9fc",
                        "primary-container": "#0e5a52",
                        "on-secondary-fixed-variant": "#862208",
                        "primary": "#00413b",
                        "surface-dim": "#d8dadd",
                        "on-tertiary-fixed-variant": "#205110",
                        "surface-container-low": "#f2f4f7",
                        "tertiary-container": "#2a5b19",
                        "secondary-container": "#fd7958",
                        "background": "#f7f9fc",
                        "on-error-container": "#93000a",
                        "on-background": "#191c1e",
                        "secondary-fixed": "#ffdad2",
                        "inverse-surface": "#2d3133",
                        "outline": "#6f7977",
                        "on-primary-fixed-variant": "#005049",
                        "error": "#ba1a1a",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#246960",
                        "on-surface-variant": "#3f4947",
                        "primary-fixed": "#acefe4",
                        "tertiary-fixed": "#b8f29e",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#e0e3e6",
                        "primary-fixed-dim": "#91d3c8",
                        "on-secondary-container": "#6e1500",
                        "surface-container-high": "#e6e8eb",
                        "inverse-on-surface": "#eff1f4",
                        "secondary": "#a7391e",
                        "on-primary-container": "#8dcfc4",
                        "on-secondary": "#ffffff",
                        "on-surface": "#191c1e",
                        "inverse-primary": "#91d3c8",
                        "secondary-fixed-dim": "#ffb4a2",
                        "on-tertiary-fixed": "#042100",
                        "on-tertiary-container": "#99d281",
                        "on-secondary-fixed": "#3c0700",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#00201c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-lg": "32px",
                        "stack-sm": "8px",
                        "stack-md": "16px",
                        "margin-mobile": "20px",
                        "card-padding": "24px",
                        "base": "8px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "display-md": ["Bricolage Grotesque"],
                        "title-lg": ["Inter"],
                        "headline-sm": ["Bricolage Grotesque"],
                        "body-lg": ["Inter"],
                        "label-mono": ["JetBrains Mono"],
                        "body-md": ["Inter"],
                        "display-lg-mobile": ["Bricolage Grotesque"],
                        "display-lg": ["Bricolage Grotesque"]
                    },
                    "fontSize": {
                        "display-md": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-sm": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-mono": ["13px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "display-lg-mobile": ["32px", {"lineHeight": "38px", "fontWeight": "800"}],
                        "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "800"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Custom input styling for large numbers */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center">
<!-- TopAppBar (Transactional - Back button) -->
<header class="w-full flex items-center justify-between px-margin-mobile h-16 max-w-[800px] mx-auto bg-surface border-none no-shadows top-0 sticky z-50">
<button aria-label="Volver" class="w-10 h-10 flex items-center justify-center rounded-full text-primary hover:bg-surface-container-low transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<div class="flex-1 flex justify-center items-center">
<h1 class="font-display-md text-display-md-mobile md:text-display-md text-primary font-extrabold tracking-tight">Nuevo Registro</h1>
</div>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-[800px] px-margin-mobile py-stack-lg flex flex-col gap-stack-lg flex-1">
<!-- Category Selector Form Section -->
<section class="flex flex-col gap-stack-md">
<h2 class="font-title-lg text-title-lg text-on-surface">Categoría</h2>
<div class="flex flex-wrap gap-base">
<!-- Selected Chip -->
<button class="px-4 py-2 rounded-full bg-primary-fixed text-on-primary-fixed-variant font-body-md text-body-md font-medium border border-primary-fixed transition-colors active:scale-95">
                    Piel
                </button>
<!-- Unselected Chips -->
<button class="px-4 py-2 rounded-full bg-surface-container-lowest text-on-surface-variant font-body-md text-body-md border border-outline-variant hover:bg-surface-container-low transition-colors active:scale-95">
                    Crecimiento
                </button>
<button class="px-4 py-2 rounded-full bg-surface-container-lowest text-on-surface-variant font-body-md text-body-md border border-outline-variant hover:bg-surface-container-low transition-colors active:scale-95">
                    Nutrición
                </button>
<button class="px-4 py-2 rounded-full bg-surface-container-lowest text-on-surface-variant font-body-md text-body-md border border-outline-variant hover:bg-surface-container-low transition-colors active:scale-95">
                    Actividad
                </button>
</div>
</section>
<!-- Numeric Input Form Section -->
<section class="flex flex-col gap-stack-md mt-stack-md">
<label class="font-title-lg text-title-lg text-on-surface" for="cantidad">Cantidad</label>
<div class="bg-surface-container-lowest rounded-[20px] p-card-padding border border-[#E6EBF3] shadow-[0_4px_16px_rgba(11,18,32,0.08)] flex flex-col items-center justify-center gap-stack-sm relative overflow-hidden group">
<!-- Decorative background subtle gradient -->
<div class="absolute inset-0 bg-gradient-to-b from-primary-fixed/5 to-transparent pointer-events-none rounded-[20px]"></div>
<div class="flex items-baseline gap-2 z-10">
<input class="bg-transparent border-none text-center font-label-mono text-[64px] leading-none font-bold text-primary focus:ring-0 w-[150px] p-0" id="cantidad" min="0" name="cantidad" placeholder="0.0" step="0.1" type="number" value="1"/>
<span class="font-body-lg text-body-lg text-on-surface-variant">unidades</span>
</div>
<!-- Plus/Minus Controls inside card for easy adjustment -->
<div class="flex items-center gap-stack-lg mt-stack-sm z-10">
<button class="w-12 h-12 rounded-full bg-surface-container text-on-surface flex items-center justify-center hover:bg-surface-container-high transition-colors active:scale-90" onclick="document.getElementById('cantidad').stepDown()">
<span class="material-symbols-outlined">remove</span>
</button>
<button class="w-12 h-12 rounded-full bg-surface-container text-on-surface flex items-center justify-center hover:bg-surface-container-high transition-colors active:scale-90" onclick="document.getElementById('cantidad').stepUp()">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
</section>
<!-- Notes Input Form Section -->
<section class="flex flex-col gap-stack-md mt-stack-md">
<label class="font-title-lg text-title-lg text-on-surface" for="notas">Notas (Opcional)</label>
<textarea class="w-full bg-surface-container-lowest rounded-[12px] border border-[#E6EBF3] p-4 font-body-lg text-body-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-colors resize-none shadow-sm" id="notas" name="notas" placeholder="Añade detalles sobre este registro..." rows="3"></textarea>
</section>
<!-- Spacer to push button to bottom if screen is tall enough -->
<div class="flex-1 min-h-[40px]"></div>
<!-- Primary Action Button -->
<button class="w-full h-[52px] bg-primary-container text-on-primary rounded-[16px] font-body-lg text-body-lg font-semibold shadow-sm hover:opacity-90 active:scale-[0.98] transition-all duration-200 mt-auto mb-stack-lg flex items-center justify-center gap-2">
<span>Guardar registro</span>
<span class="material-symbols-outlined text-[20px]">check</span>
</button>
</main>
<script>
        // Simple JS for chip selection toggle visual
        document.querySelectorAll('section:first-of-type button').forEach(button => {
            button.addEventListener('click', function() {
                // Reset all
                document.querySelectorAll('section:first-of-type button').forEach(btn => {
                    btn.className = "px-4 py-2 rounded-full bg-surface-container-lowest text-on-surface-variant font-body-md text-body-md border border-outline-variant hover:bg-surface-container-low transition-colors active:scale-95";
                });
                // Set active
                this.className = "px-4 py-2 rounded-full bg-primary-fixed text-on-primary-fixed-variant font-body-md text-body-md font-medium border border-primary-fixed transition-colors active:scale-95";
            });
        });
    </script>
</body></html>
