<style>
        body {
            background-color: #F7F9FC;
            color: #191c1e;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .soft-card-shadow {
            box-shadow: 0 4px 16px rgba(11, 18, 32, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="font-body-md text-body-md">
<!-- TopAppBar -->
<header class="w-full sticky top-0 z-50 bg-surface flex items-center px-margin-mobile h-16 w-full max-w-[800px] mx-auto">
<button class="mr-4 text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold text-primary">Importar productos</h1>
</header>
<main class="max-w-[800px] mx-auto px-margin-mobile pt-4 pb-24 space-y-stack-lg">
<!-- Explainer Card -->
<section class="bg-surface-container-lowest rounded-[20px] p-card-padding soft-card-shadow border border-outline-variant/30">
<div class="flex gap-4 items-start">
<div class="p-2 bg-primary-fixed-dim/20 rounded-full text-primary">
<span class="material-symbols-outlined">info</span>
</div>
<p class="font-body-lg text-on-surface-variant leading-relaxed">
                    Puedes importar una orden para precargar tus productos; tú traes tus datos. Este paso es opcional.
                </p>
</div>
</section>
<!-- Illustration / Mood Image -->
<div class="w-full rounded-[20px] overflow-hidden aspect-[16/9]">
<img class="w-full h-full object-cover" data-alt="A clean, minimalist workspace scene featuring a polished wooden desk with a sleek laptop and a high-end smartphone. The lighting is bright and natural, coming from a side window, emphasizing a calm and organized environment. The color palette is composed of soft whites, light greys, and deep teal accents, maintaining a professional and warm coach aesthetic for a data management tool." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC6r3YSDVfBWR0V6adFSMqKf_crEqpmm69aMpdjcK5z-GWeZR1snfO2vMsbNa2vCawrqrMekgAMMT4-F7_zVG7mkioWZHmaA0Jaq7R2WvMNQqA7KtHIbpO4cdeWPZstGGVD4X1VcQlYuJpzmPBHlrNcH7zVSsmHASln5iRjMlhWorZt3JJV3pJfxrIpEDzfw1bHqJIqZykyVsMHrR6XkJOX3pJWsWsOUK3vLQqefDi-ylOfWP88lho3cHPgVGOeBs-GDH9LI8-GCj72"/>
</div>
<!-- Form Section -->
<form class="space-y-stack-md" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-body-md font-medium text-on-surface" for="email">Correo electrónico</label>
<input class="w-full h-14 px-4 bg-surface-container-lowest border border-outline-variant rounded-[12px] focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all font-body-lg" id="email" placeholder="ejemplo@correo.com" type="email"/>
</div>
<!-- Order Number Field (With Error) -->
<div class="space-y-2">
<label class="block font-body-md font-medium text-on-surface" for="order">Número de orden</label>
<input class="w-full h-14 px-4 bg-surface-container-lowest border border-error rounded-[12px] focus:ring-2 focus:ring-error focus:border-transparent outline-none transition-all font-body-lg" id="order" type="text" value="HT-99821"/>
<p class="text-error font-body-md mt-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">error</span>
                    Orden no encontrada
                </p>
</div>
<!-- Consent Checkbox -->
<label class="flex items-start gap-3 pt-2 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer h-6 w-6 rounded-[6px] border-outline-variant text-primary focus:ring-primary/20 cursor-pointer" type="checkbox"/>
</div>
<span class="font-body-md text-on-surface-variant leading-tight select-none pt-0.5 group-hover:text-on-surface transition-colors">
                    Doy mi consentimiento para transferir los datos de mi orden de forma segura.
                </span>
</label>
</form>
<!-- Actions -->
<div class="space-y-4 pt-4">
<button class="w-full h-[52px] bg-primary text-white font-semibold rounded-[16px] active:scale-95 transition-all shadow-sm flex items-center justify-center gap-2">
<span class="material-symbols-outlined">sync_alt</span>
                Importar orden
            </button>
<button class="w-full h-[52px] bg-transparent border-2 border-primary text-primary font-semibold rounded-[16px] active:scale-95 transition-all flex items-center justify-center">
                Lo agrego manualmente
            </button>
</div>
</main>
<!-- Bottom Navigation Shell (Consistent with Shared Components) -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-3 pb-safe bg-surface-container-lowest shadow-[0_-4px_16px_rgba(11,18,32,0.04)] z-50 md:hidden">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container rounded-full p-2 transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] mt-1">Inicio</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container rounded-full p-2 transition-colors" href="#">
<span class="material-symbols-outlined">edit_note</span>
<span class="text-[10px] mt-1">Diario</span>
</a>
<a class="flex flex-col items-center justify-center text-primary font-semibold hover:bg-surface-container rounded-full p-2 transition-colors" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">assignment</span>
<span class="text-[10px] mt-1">Protocolo</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container rounded-full p-2 transition-colors" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] mt-1">Ajustes</span>
</a>
</nav>
<script>
        // Micro-interaction for inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').classList.remove('text-primary');
            });
        });

        // Toggle state for the error field on input to show dynamic response
        const orderInput = document.getElementById('order');
        orderInput.addEventListener('input', (e) => {
            if(e.target.value !== "HT-99821") {
                orderInput.classList.remove('border-error');
                const errorMsg = orderInput.nextElementSibling;
                if(errorMsg && errorMsg.classList.contains('text-error')) {
                    errorMsg.style.display = 'none';
                }
            }
        });
    </script>
</body></html>
